[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  NPM_CONFIG_PRODUCTION = "false"

[functions]
  node_bundler = "esbuild"

[functions."compare-estimates"]
  timeout = 26

[functions."analyze-estimate"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-nextjs"


